version: "3.9"

services:
  # ── FastAPI backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: curio-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Allow both localhost (browser) and the frontend container
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser calls hit port 8000 on the host, not the container name
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: curio-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: curio-network
